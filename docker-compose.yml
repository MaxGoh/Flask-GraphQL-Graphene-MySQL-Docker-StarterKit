services:
  server:
    container_name: flask
    build: .
    ports:
      # Host port 8000 (macOS AirPlay occupies 5000)
      - "8000:5000"
    volumes:
      - .:/usr/src/app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: database
    depends_on:
      database:
        condition: service_healthy

  database:
    container_name: database
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-database_name}
      MYSQL_USER: ${DB_USERNAME:-username}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - flask-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flask-db:
